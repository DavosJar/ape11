      NODO_4: p4
      NODO_5: p5
    networks:
      - bully-net
    restart: unless-stopped
    ports:
      - 8083:8080

  p4:
    build: .
    image: localhost:5000/app:1.0
    environment:
      NODE_ID: 4
      API_PORT: 8080
      NODO_1: p1
      NODO_2: p2
      NODO_3: p3
      NODO_4: p4
      NODO_5: p5
